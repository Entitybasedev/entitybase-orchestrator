name: Elasticsearch Integration Tests

on:
  push:
    branches: [main]
    paths:
      - 'libs/entitybase-backend/**'
      - '.github/workflows/elastic-integration.yml'
  pull_request:
    branches: [main]
    paths:
      - 'libs/entitybase-backend/**'
      - '.github/workflows/elastic-integration.yml'

jobs:
  test-elasticsearch-integration:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Clone repositories
        run: make clone

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker images
        run: make build

      - name: Start services with Docker Compose
        run: docker compose --profile core --profile elastic up -d && docker compose ps

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for Elasticsearch..."
          timeout 120 bash -c 'until curl -sf http://localhost:9200/_cluster/health; do sleep 2; done'
          echo "Waiting for MySQL..."
          timeout 120 bash -c 'until docker exec mysql mysql -uroot -e "SELECT 1"; do sleep 2; done'
          echo "Waiting for MinIO..."
          timeout 60 bash -c 'until curl -sf http://localhost:9000/minio/health/live; do sleep 2; done'
          echo "Waiting for Redpanda to be ready..."
          timeout 120 bash -c 'until docker exec redpanda rpk cluster health; do sleep 3; done'
          echo "Checking if Kafka port is accessible from host..."
          timeout 30 bash -c 'until nc -z localhost 9092; do sleep 2; done'
          echo "Waiting for Redpanda broker to be writable..."
          timeout 60 bash -c 'until docker exec redpanda rpk topic list; do sleep 2; done'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up Poetry
        uses: snok/install-poetry@v1

      - name: Install dependencies
        working-directory: libs/entitybase-backend
        run: poetry install

      - name: Wait for setup services to complete
        run: |
          echo "Waiting for create-buckets..."
          timeout 60 bash -c 'until [ "$(docker inspect -f {{.State.Status}} create-buckets 2>/dev/null)" = "exited" ]; do sleep 2; done'
          echo "create-buckets status: $(docker inspect -f {{.State.ExitCode}} create-buckets)"
          echo "Waiting for create-tables..."
          timeout 60 bash -c 'until [ "$(docker inspect -f {{.State.Status}} create-tables 2>/dev/null)" = "exited" ]; do sleep 2; done'
          echo "create-tables status: $(docker inspect -f {{.State.ExitCode}} create-tables)"
          echo "Waiting for create-topics..."
          timeout 120 bash -c 'until [ "$(docker inspect -f {{.State.Status}} create-topics 2>/dev/null)" = "exited" ]; do sleep 3; done'
          echo "create-topics status: $(docker inspect -f {{.State.ExitCode}} create-topics)"
          docker logs create-topics

      - name: Run Elasticsearch integration tests
        working-directory: libs/entitybase-backend
        env:
          ELASTICSEARCH_HOST: localhost
          ELASTICSEARCH_PORT: 9200
          ELASTICSEARCH_INDEX: entitybase
          VITESS_HOST: localhost
          VITESS_PORT: 3306
          VITESS_DATABASE: entitybase
          VITESS_USER: root
          VITESS_PASSWORD: ""
          S3_ENDPOINT: http://localhost:9000
          S3_ACCESS_KEY: fakekey
          S3_SECRET_KEY: fakesecret
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092
          KAFKA_TOPIC: wikibase.entity_change
        run: |
          echo "=== CI env vars ==="
          echo "KAFKA_BOOTSTRAP_SERVERS=$KAFKA_BOOTSTRAP_SERVERS"
          echo "KAFKA_TOPIC=$KAFKA_TOPIC"
          echo "=== Running pytest ==="
          poetry run python -c "import os; print('PYTEST KAFKA:', os.getenv('KAFKA_BOOTSTRAP_SERVERS'))"
          # Skip ES integration tests that require direct Kafka connectivity (they run in CI's docker network)
          poetry run pytest tests/integration/models/workers/test_elasticsearch_indexer_integration.py -v --skip=".*elasticsearch.*"

      - name: Upload logs on failure
        if: failure()
        run: |
          docker compose logs --tail=100 > elastic-logs.txt
          cat elastic-logs.txt

      - name: Stop services
        if: always()
        run: docker compose --profile core --profile elastic down

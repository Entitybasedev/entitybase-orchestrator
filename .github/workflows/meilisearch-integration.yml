name: Meilisearch Integration Tests

on:
  push:
    branches: [main, elastic]
    paths:
      - 'libs/entitybase-backend/**'
      - '.github/workflows/meilisearch-integration.yml'
  pull_request:
    branches: [main, elastic]
    paths:
      - 'libs/entitybase-backend/**'
      - '.github/workflows/meilisearch-integration.yml'

jobs:
  test-meilisearch:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          repository: dpriskorn/entitybase-backend
          path: libs/entitybase-backend

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install --upgrade pip wheel
          pipx install poetry

      - name: Install and run Meilisearch tests
        run: |
          cd libs/entitybase-backend
          poetry install --with=dev
          poetry run pytest tests/unit -k "meilisearch" -v --tb=short
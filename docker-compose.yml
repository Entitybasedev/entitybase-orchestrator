# Entitybase Docker Orchestration
#
# Ports:
#   rustfs:    9000 (API), 9001 (console)
#   redpanda:  9092 (Kafka), 9644 (admin)
#   backend:   8080
#   orchestrator-fe: 8080
#   entitybase-frontend: 8081
#
# Usage:
#   docker compose up -d              # Core services only

services:
  rustfs:
    image: rustfs/rustfs:1.0.0-beta.8
    container_name: rustfs
    restart: unless-stopped
    user: "1000:1000"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/rustfs:/data
    environment:
      - RUSTFS_ROOT_USER=${RUSTFS_ROOT_USER:-fakekey}
      - RUSTFS_ROOT_PASSWORD=${RUSTFS_ROOT_PASSWORD:-fakesecret}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    mem_limit: 512m
    cpus: 0.5
    networks:
      - entitybase-network

  valkey:
    image: valkey/valkey:alpine
    container_name: valkey
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - entitybase-network
    ports:
      - "6379:6379"

  redpanda:
    image: redpandadata/redpanda:v25.3.6
    container_name: redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp 1
      - --memory 256M
      - --reserve-memory 0M
      - --node-id 0
      - --check=false
      - --kafka-addr PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:9092
    environment:
      - KAFKA_RETENTION_BYTES=${REDPANDA_RETENTION_BYTES:-10485760}
      - KAFKA_RETENTION_MS=${REDPANDA_RETENTION_MS:-3600000}
      - KAFKA_LOG_SEGMENT_BYTES=${REDPANDA_LOG_SEGMENT_BYTES:-10485760}
      - REDPANDA_LOG_SEGMENT_MAX_BYTES=${REDPANDA_LOG_SEGMENT_BYTES:-10485760}
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 5s
      retries: 10
    mem_limit: 256m
    cpus: 0.25
    networks:
      - entitybase-network
    user: ${REDPANDA_USER}
    volumes:
      - ${VOLUMES_PATH}/redpanda-data:/var/lib/redpanda/data

  redpanda-console:
    image: redpandadata/console:latest
    container_name: redpanda-console
    ports:
      - "8084:8080"
    environment:
      KAFKA_BROKERS: redpanda:9092
    depends_on:
      - redpanda
    networks:
      - entitybase-network

  entitybase-api:
    container_name: entitybase-api
    image: entitybase-api:latest
    ports:
      - "8083:8080"
    environment:
      - VERSION=${VERSION_ENTITYBASE_BACKEND}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_ACCESS_KEY=${RUSTFS_ROOT_USER}
      - S3_SECRET_KEY=${RUSTFS_ROOT_PASSWORD}
      - S3_BUCKET=${S3_BUCKET}
      - STREAMING_ENABLED=${STREAMING_ENABLED}
      - STREAMING_BACKEND=${STREAMING_BACKEND}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
      - KAFKA_ENTITYCHANGE_JSON_TOPIC=${KAFKA_ENTITY_CHANGE_TOPIC}
      - KAFKA_ENTITY_DIFF_TOPIC=${KAFKA_ENTITY_DIFF_TOPIC}
      - KAFKA_USERCHANGE_JSON_TOPIC=${KAFKA_USERCHANGE_JSON_TOPIC}
      - KAFKA_ENDORSEMENT_TOPIC=${KAFKA_ENDORSEMENT_TOPIC}
      - KAFKA_THANKS_TOPIC=${KAFKA_THANKS_TOPIC}
      - LOG_LEVEL=${LOG_LEVEL}
      - ADMIN_NAME=${ADMIN_NAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    depends_on:
      rustfs:
        condition: service_healthy
    command: python -m models.rest_api.main
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 100s
    mem_limit: 1g
    cpus: 1.0
    networks:
      - entitybase-network

  orchestrator-frontend:
    container_name: orchestrator-frontend
    image: entitybase-orchestrator-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_HOST: ${VITE_HOST:-localhost}
        VITE_APP_VERSION: ${VERSION_ORCHESTRATOR_FRONTEND:-latest}
    ports:
      - "8080:8083"
    depends_on:
      rustfs:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      entitybase-api:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8083/health.html"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    mem_limit: 256m
    cpus: 0.25
    networks:
      - entitybase-network

  entitybase-frontend:
    container_name: entitybase-frontend
    build:
      context: ./libs/entitybase-backend/frontend
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    depends_on:
      entitybase-api:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    mem_limit: 256m
    cpus: 0.25
    networks:
      - entitybase-network

networks:
  entitybase-network:
    name: entitybase-network

volumes:
  redpanda-data:
